{% extends "layout.html" %}

{% block body %}

    <body>
        <div class="container">
            <header class="blog-header py-3 mb-3">
                <div class="row flex-nowrap justify-content-between align-items-center">
                <div class="col-4 pt-1">
                        <a class="text-muted" href="{% url 'index' %}">Back to Homepage</a>
                </div>
                <div class="col-4 text-center">
                    <a class="blog-header-logo text-dark" href="{% url 'index' %}">The Newer Times</a>
                </div>
                <div class="col-4 d-flex justify-content-end align-items-center">
                    {% if user.is_authenticated %}
                    <a class="btn btn-sm btn-outline-secondary" href="{% url 'logout' %}">Log out</a>
                    {% endif %}
                </div>
                </div>
            </header>
            <div class="pb-5" style="margin-bottom: 75px;">
                {% if message %}
                    <div class="alert alert-danger" role="alert">{{ message }}</div>
                {% endif %}

                <h2>Create Article</h2>
                <form action="{% url 'create_article' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="title" class="form-label">Article Title</label>
                        <input autofocus class="form-control" type="text" name="title" id="title" placeholder="Article Title">
                    </div>
                    <!-- <div class="form-group">
                        <label for="title" class="form-label">Category</label>
                        <input class="form-control" type="text" name="category" id="category" placeholder="Article Category">
                    </div> -->
                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select category w-100" name="category" aria-label="Article Category">
                            {% for i in categories %}
                                <option value="{{ i.category_code }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="image" class="form-label">Image URL</label>
                        <input class="form-control" type="text" name="image" id="image" placeholder="Image URL">
                    </div>
                    <div class="form-group">
                        <label for="article" class="form-label">Article Text</label>
                        <textarea class="form-control" id="article" name="article" rows="10">Article Text </textarea>
                    </div>
                    <input class="btn btn-primary" type="submit" value="Publish">
                </form>
            </div>
        </div>
    </body>

{% endblock %}
