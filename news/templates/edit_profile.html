{% extends "layout.html" %}

{% block body %}

    <body>
        <div class="container" style="margin-bottom: 100px;">
            <header class="blog-header py-3 mb-3">
                <div class="row flex-nowrap justify-content-between align-items-center">
                <div class="col-4 pt-1">
                        <a class="text-muted" href="{% url 'index' %}">Back to Homepage</a>
                </div>
                <div class="col-4 text-center">
                    <a class="blog-header-logo text-dark" href="#">The Newer Times</a>
                </div>
                <div class="col-4 d-flex justify-content-end align-items-center">
                    {% if user.is_authenticated %}
                    <a class="btn btn-sm btn-outline-secondary" href="{% url 'logout' %}">Log out</a>
                    {% endif %}
                </div>
                </div>
            </header>
            <div class="pb-5 mb-5">
                {% if message %}
                    <div class="alert alert-danger" role="alert">{{ message }}</div>
                {% endif %}

                <h2>Edit Profile</h2>
                <form action="{% url 'edit_profile' user.username %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="formFile" class="form-label">Upload Avatar Image</label>
                        <input class="form-control" type="file" name="img" id="form_image">
                    </div>
                    <div class="form-group">
                        <label for="first_name" class="form-label">First Name</label>
                        <input class="form-control" type="text" name="first_name" id="first_name" placeholder="{{ user.first_name }}">
                    </div>
                    <div class="form-group">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input class="form-control" type="text" name="last_name" id="last_name" placeholder="{{ user.last_name }}">
                    </div>
                    <div class="form-group">
                        <label for="article" class="form-label">Biography</label>
                        <textarea class="form-control" id="bio" name="bio" rows="10">{% if user.bio %}{{ user.bio }}{% else %}Insert Biography Here ...{% endif %}
                        </textarea>
                    </div>
                    <input class="btn btn-primary" type="submit" value="Submit">
                </form>
            </div>
        </div>
    </body>

{% endblock %}
